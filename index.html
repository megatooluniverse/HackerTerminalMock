<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>GHOST MOBILE OS V14</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --theme: #0f0; --bg: #020202; --sys: 'Share Tech Mono', monospace; --term: 'VT323', monospace; }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg); color: var(--theme); font-family: var(--sys); 
            height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
            touch-action: none; -webkit-user-select: none; user-select: none; 
        }

        /* HOLLYWOOD VIGNETTE & SCANLINES */
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,255,0,0.02) 0%, rgba(0,0,0,0.85) 100%),
                        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 100%, 100% 2px, 3px 100%; pointer-events: none; z-index: 100;
        }

        header { 
            background: #000; color: #777; padding: 6px 10px; font-size: 0.8rem; 
            border-bottom: 1px solid #111; display: flex; justify-content: space-between; 
            z-index: 10; flex-shrink: 0; font-weight: bold; letter-spacing: 1px;
        }

        #core-ui { 
            display: flex; flex-direction: column; flex: 1; padding: 5px; gap: 5px; 
            background: #050505; overflow: hidden;
        }

        .panel { 
            border: 1px solid #222; background: rgba(0,0,0,0.8); 
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }
        
        .p-title { 
            background: #0a0a0a; color: #0ff; padding: 4px 6px; font-size: 0.75rem; 
            border-bottom: 1px solid #222; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;
        }

        /* 1. TERMINAL */
        #term-panel { flex: 1; min-height: 0; }
        #term-output { flex: 1; overflow-y: auto; padding: 8px; font-family: var(--term); font-size: 1.15rem; line-height: 1.1; word-wrap: break-word; }
        #term-output::-webkit-scrollbar { width: 0; display: none; }

        /* 2. MIDDLE ROW */
        #mid-row { display: flex; flex-direction: row; height: 110px; gap: 5px; flex-shrink: 0; }
        
        /* RADAR */
        #radar-container { flex: 1; display: flex; justify-content: center; align-items: center; background: #000;}
        .radar {
            width: 70px; height: 70px; border-radius: 50%; border: 1px solid #0f0; position: relative;
            background: linear-gradient(90deg, transparent 49%, rgba(0,255,0,0.4) 49%, rgba(0,255,0,0.4) 51%, transparent 51%),
                        linear-gradient(0deg, transparent 49%, rgba(0,255,0,0.4) 49%, rgba(0,255,0,0.4) 51%, transparent 51%);
            box-shadow: 0 0 15px #0f0 inset; overflow: hidden; 
        }
        .radar-sweep {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 70%, rgba(0,255,0,0.8) 100%);
            animation: spin 1.5s linear infinite; z-index: 2; pointer-events: none;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* RADAR DOTS */
        .radar-dot {
            position: absolute; width: 4px; height: 4px; border-radius: 50%;
            z-index: 1; transform: translate(-50%, -50%); box-shadow: 0 0 5px currentColor;
            animation: pulseDot 1s infinite alternate;
        }
        @keyframes pulseDot { 0% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.8); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); } }

        /* SYS LOAD & TIMER */
        #info-col { flex: 1.2; display: flex; flex-direction: column; gap: 5px; }
        
        .sys-load { background: #000; padding: 4px; font-size: 0.7rem; border: 1px solid #222; flex: 1; display: flex; flex-direction: column; justify-content: center;}
        .load-row { display: flex; justify-content: space-between; margin-bottom: 2px;}
        .load-bar-bg { width: 60%; height: 6px; background: #222; margin-top: 3px;}
        .load-bar-fg { height: 100%; background: #f03; width: 95%; transition: width 0.2s;}

        .timer-box { background: #000; border: 1px solid #222; flex: 1.5; display: flex; flex-direction: column; justify-content: center; align-items: center;}
        #timer-text { font-size: 1.8rem; color: #f03; font-weight: bold; text-shadow: 0 0 10px #f03; font-family: var(--sys);}

        /* 3. BOTTOM PANEL (DECRYPTOR) */
        #bottom-panel { flex-shrink: 0; padding-bottom: 5px; }
        #password-cracker { 
            font-family: var(--term); font-size: 1.4rem; letter-spacing: 3px; 
            text-align: center; margin: 5px 0; padding: 8px; background: rgba(0, 255, 0, 0.05); 
            border: 1px solid rgba(0,255,0,0.3); word-break: break-all; min-height: 45px;
            display: flex; align-items: center; justify-content: center; flex-wrap: wrap;
        }
        
        /* DYNAMIC PROGRESS BAR */
        .prog-bar-container { width: 95%; height: 8px; border: 1px solid #0f0; margin: 5px auto; position: relative; background: #000; }
        #prog-bar { width: 0%; height: 100%; background: #0f0; transition: width 0.1s; box-shadow: 0 0 10px #0f0;}

        /* OVERLAYS */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; }
        #input-box { border: 1px solid #0f0; padding: 25px; text-align: center; background: rgba(0,15,0,0.95); width: 90%; max-width: 350px; box-shadow: 0 0 30px rgba(0,255,0,0.2); transform: translateY(-10vh); }
        #target-input { width: 100%; background: #000; border: 1px solid #0f0; color: #fff; font-family: var(--term); font-size: 16px; padding: 12px; margin: 15px 0; outline: none; text-align: center; }
        #start-btn { background: #0f0; color: #000; border: none; padding: 12px; font-family: var(--sys); font-size: 1.1rem; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase;}

        /* UTILITY CLASSES */
        .c { color: #0ff; text-shadow: 0 0 4px #0ff;} 
        .r { color: #f03; text-shadow: 0 0 4px #f03;} 
        .y { color: #ffb800; } 
        .w { color: #fff; text-shadow: 0 0 5px #fff;} 
        .d { color: #444; text-shadow: none;} 
        .m { color: #f0f; }
        
        .blink { animation: blinkAnim 0.3s infinite alternate; }
        @keyframes blinkAnim { 0% { opacity: 0.4; } 100% { opacity: 1; } }

        #fake-watermark { position: absolute; bottom: 2px; right: 2px; font-size: 8px; color: rgba(255,0,0,0.3); z-index: 999; pointer-events: none; }
    </style>
</head>
<body>

    <header>
        <span>OP_GHOST // V14_MASTERMIND</span>
        <span class="r blink">SYS_OVERLOAD</span>
    </header>

    <div id="core-ui">
        <div class="panel" id="term-panel">
            <div class="p-title">LIVE_TERMINAL_STDOUT</div>
            <div id="term-output"></div>
        </div>

        <div id="mid-row">
            <div class="panel" style="flex: 1;">
                <div class="p-title">NODE_RADAR</div>
                <div id="radar-container"><div class="radar" id="radar-screen"><div class="radar-sweep"></div></div></div>
            </div>
            
            <div id="info-col">
                <div class="sys-load panel">
                    <div class="load-row"><span class="c">CPU</span><span id="cpu-val" class="r">99%</span></div>
                    <div class="load-bar-bg"><div class="load-bar-fg" id="cpu-bar"></div></div>
                    <div class="load-row" style="margin-top:2px;"><span class="c">RAM</span><span id="ram-val" class="y">85%</span></div>
                    <div class="load-bar-bg"><div class="load-bar-fg" id="ram-bar" style="background:#ffb800; width:85%;"></div></div>
                </div>
                <div class="timer-box panel">
                    <div class="d" style="font-size: 0.65rem;">TRACE_LOCKOUT:</div>
                    <div id="timer-text">01:00.00</div>
                </div>
            </div>
        </div>

        <div class="panel" id="bottom-panel">
            <div class="p-title">PSYCHOLOGICAL_DECRYPTOR_MATRIX</div>
            <div style="padding: 5px;">
                <div class="c" style="font-size: 0.8rem; text-align: left;">TARGET: <span id="lbl-target" class="w">N/A</span></div>
                <div id="password-cracker" class="d">AWAITING_INPUT...</div>
                <div class="prog-bar-container"><div id="prog-bar"></div></div>
            </div>
        </div>
    </div>

    <div id="input-overlay" class="overlay">
        <div id="input-box">
            <div class="c" style="font-size: 1.4rem; margin-bottom: 5px; font-weight: bold;">UPLINK SECURED</div>
            <div class="d" style="font-size: 0.9rem;">Enter Target Username to bypass protocol.</div>
            <input type="text" id="target-input" autocomplete="off" placeholder="e.g. rahul_99">
            <button id="start-btn">INITIATE HACK</button>
        </div>
    </div>

    <div id="result-overlay" class="overlay" style="display:none; text-align:center; padding: 20px;">
        <h1 id="res-title" style="font-size: 2.8rem; margin-bottom: 10px; font-family: var(--sys); text-transform: uppercase;"></h1>
        <p id="res-desc" class="w" style="font-size: 1.2rem; line-height: 1.5; font-family: var(--term);"></p>
        <p class="d" style="margin-top: 30px; font-size: 1rem;">Wiping trace logs in 5 seconds...</p>
    </div>

    <div id="fake-watermark">FAKE PRANK SCREEN</div>

    <script>
        const term = document.getElementById('term-output');
        const passCracker = document.getElementById('password-cracker');
        const timerText = document.getElementById('timer-text');
        const progBar = document.getElementById('prog-bar');
        const inputOverlay = document.getElementById('input-overlay');
        const targetInput = document.getElementById('target-input');
        const radarScreen = document.getElementById('radar-screen');
        
        const rHex = (len) => [...Array(len)].map(() => Math.floor(Math.random() * 16).toString(16).toUpperCase()).join('');
        
        // FULL KEYBOARD CHARACTERS
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;':\",./<>?";

        function printLog(html) {
            const div = document.createElement('div'); div.innerHTML = html; term.appendChild(div);
            if (term.childElementCount > 60) term.removeChild(term.firstChild); 
            term.scrollTop = term.scrollHeight;
        }

        // FAKE CPU/RAM LOAD ANIMATION
        setInterval(() => {
            const cpu = Math.floor(Math.random() * 10) + 90; 
            const ram = Math.floor(Math.random() * 15) + 80; 
            document.getElementById('cpu-val').innerText = cpu + '%';
            document.getElementById('cpu-bar').style.width = cpu + '%';
            document.getElementById('ram-val').innerText = ram + '%';
            document.getElementById('ram-bar').style.width = ram + '%';
        }, 800);

        document.getElementById('start-btn').addEventListener('click', () => {
            const rawTarget = targetInput.value.trim();
            if (!rawTarget) return;

            targetInput.blur(); 
            inputOverlay.style.display = 'none';
            document.getElementById('lbl-target').innerText = rawTarget.toUpperCase();

            let timeLeft = 6000; // 60 seconds
            const totalTime = 6000;
            let intervals = [];

            // OUTCOME PRE-CALCULATION (50% Chance)
            const isSuccess = Math.random() > 0.5; 

            // ==========================================
            // PSYCHOLOGICAL PASSWORD GENERATION ALGORITHM
            // ==========================================
            const passLength = Math.floor(Math.random() * (20 - 6 + 1)) + 6; // Length 6 to 20
            
            // Extract a chunk from the target's username (3 to 4 characters) to make it look real
            let nameChunk = "";
            if (rawTarget.length >= 3) {
                let chunkLen = Math.min(Math.floor(Math.random() * 2) + 3, rawTarget.length); // 3 or 4 chars
                let startIdx = Math.floor(Math.random() * (rawTarget.length - chunkLen + 1));
                nameChunk = rawTarget.substring(startIdx, startIdx + chunkLen);
                
                // Randomly capitalize letters in the chunk to make it look like a password
                nameChunk = nameChunk.split('').map(c => Math.random() > 0.4 ? c.toUpperCase() : c.toLowerCase()).join('');
            } else {
                nameChunk = rawTarget;
            }

            // Fill the rest with random symbols and numbers
            let remainingLen = passLength - nameChunk.length;
            if(remainingLen < 0) remainingLen = 0;
            
            let prefixLen = Math.floor(Math.random() * remainingLen); // How many random chars before the name
            let suffixLen = remainingLen - prefixLen; // How many random chars after the name

            let targetKey = "";
            for(let i=0; i<prefixLen; i++) targetKey += chars[Math.floor(Math.random() * chars.length)];
            targetKey += nameChunk;
            for(let i=0; i<suffixLen; i++) targetKey += chars[Math.floor(Math.random() * chars.length)];

            // Reset UI
            document.querySelectorAll('.radar-dot').forEach(dot => dot.remove());
            passCracker.innerHTML = ""; 

            // 1. TERMINAL LOGS
            intervals.push(setInterval(() => {
                const time = new Date().toISOString().substring(11, 23);
                if(Math.random() > 0.85) { 
                    let burst = `<span class="y">[DATA BURST DETECTED]</span><br>`;
                    for(let b=0; b<2; b++) burst += `<span class="d">0x${rHex(8)} ${rHex(8)}</span><br>`;
                    printLog(burst);
                } else {
                    const logs = [
                        `<span class="c">[ROUTING]</span> Bypassing RSA-4096 layer...`,
                        `<span class="m">[DECRYPT]</span> Injecting zero-day payload...`,
                        `<span class="y">Extracting raw memory chunks...</span>`,
                        isSuccess ? `<span class="w">Hash match found! Compiling key...</span>` : `<span class="r">WARNING: Trace route detected!</span>`,
                        isSuccess ? `<span class="c">[+] Handshake verified successfully.</span>` : `<span class="r">Target firewall repelling packets...</span>`
                    ];
                    printLog(`<span class="d">[${time}]</span> ${logs[Math.floor(Math.random() * logs.length)]}`);
                }
            }, 150));

            // 2. RADAR DOT LOGIC
            const dotSpawnRate = isSuccess ? 800 : 250; 
            intervals.push(setInterval(() => {
                const dot = document.createElement('div');
                dot.className = 'radar-dot';
                if(isSuccess) {
                    dot.style.backgroundColor = Math.random() > 0.15 ? '#0f0' : '#f03'; 
                } else {
                    dot.style.backgroundColor = Math.random() > 0.1 ? '#f03' : '#0f0'; 
                }
                dot.style.color = dot.style.backgroundColor;

                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 30; 
                dot.style.left = `${35 + radius * Math.cos(angle)}px`;
                dot.style.top = `${35 + radius * Math.sin(angle)}px`;
                radarScreen.appendChild(dot);

                const allDots = radarScreen.querySelectorAll('.radar-dot');
                if(allDots.length > 20) { allDots[0].remove(); }
            }, dotSpawnRate));

            // 3. TIMER & PROGRESS
            intervals.push(setInterval(() => {
                timeLeft -= 1; 
                if (timeLeft <= 0) timeLeft = 0;
                
                let secs = Math.floor(timeLeft / 100).toString().padStart(2, '0');
                let ms = (timeLeft % 100).toString().padStart(2, '0');
                timerText.innerText = `00:${secs}.${ms}`;

                let prog = ((totalTime - timeLeft) / totalTime) * 100;
                progBar.style.width = `${prog}%`;

                if(timeLeft <= 0) {
                    intervals.forEach(i => clearInterval(i));
                    showResult(rawTarget, targetKey, isSuccess); 
                }
            }, 10));

            // 4. THE INVISIBLE "GROWING" PASSWORD CRACKER
            intervals.push(setInterval(() => {
                let timeElapsed = totalTime - timeLeft;
                let crackedCount = Math.floor((timeElapsed / totalTime) * targetKey.length);
                let displayHTML = "";
                
                // ONLY show characters up to the one currently being cracked.
                // Anything beyond `crackedCount` is completely invisible!
                for(let i=0; i <= crackedCount; i++) {
                    if (i === targetKey.length) break; 

                    if (i < crackedCount) {
                        // Locked Character: Solid White
                        displayHTML += `<span class="w">${targetKey[i]}</span>`;
                    } else if (i === crackedCount && timeLeft > 0) {
                        // Currently cracking character: Fast spinning and Red/Blinking
                        displayHTML += `<span class="r blink">${chars[Math.floor(Math.random() * chars.length)]}</span>`;
                    }
                }
                
                passCracker.innerHTML = displayHTML;
                
                if(timeLeft <= 0) {
                    passCracker.innerHTML = `<span class="c">${targetKey}</span>`;
                }
            }, 40)); 
        });

        // 5. RESULT SCREEN
        function showResult(target, finalKey, isSuccess) {
            setTimeout(() => {
                const resOverlay = document.getElementById('result-overlay');
                resOverlay.style.display = 'flex';
                
                if (isSuccess) {
                    document.getElementById('res-title').innerText = "ACCESS GRANTED";
                    document.getElementById('res-title').style.color = "#0f0";
                    document.getElementById('res-title').style.textShadow = "0 0 20px #0f0";
                    document.getElementById('res-desc').innerHTML = `Root bypass for <b style="color:#0ff">${target}</b> successful.<br><br><span style="color:#888; font-size:0.9rem;">DECRYPTED PAYLOAD:</span><br><span style="color:#fff; font-size: 1.5rem; letter-spacing: 2px;">${finalKey}</span>`;
                } else {
                    document.getElementById('res-title').innerText = "ACCESS DENIED";
                    document.getElementById('res-title').style.color = "#f03";
                    document.getElementById('res-title').style.textShadow = "0 0 20px #f03";
                    document.getElementById('res-desc').innerHTML = `Target <b style="color:#0ff">${target}</b> defense matrix activated.<br><br><span style="color:#f03">CRITICAL:</span> Trace route locked onto your IP. Disconnect immediately.`;
                }

                setTimeout(() => {
                    resOverlay.style.display = 'none';
                    inputOverlay.style.display = 'flex';
                    targetInput.value = '';
                    term.innerHTML = '';
                    passCracker.innerHTML = "<span class='d'>AWAITING_INPUT...</span>";
                    timerText.innerText = "01:00.00";
                    progBar.style.width = "0%";
                    document.getElementById('lbl-target').innerText = "N/A";
                    document.querySelectorAll('.radar-dot').forEach(dot => dot.remove()); 
                }, 5000);
            }, 1000);
        }
    </script>
</body>
</html>
